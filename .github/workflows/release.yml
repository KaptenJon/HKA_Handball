name: Release Android AAB

on:
  push:
    tags:
      - 'v*'

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Decode keystore
      run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > HKA_Handball/hkahandball.keystore

    - name: Publish Release AAB
      run: |
        dotnet publish HKA_Handball/HKA_Handball.csproj \
          -f net10.0-android \
          -c Release \
          -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
          -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_PASSWORD }}

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-aab
        path: HKA_Handball/bin/Release/net10.0-android/publish/*.aab

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: HKA_Handball/bin/Release/net10.0-android/publish/*.aab
        generate_release_notes: true
