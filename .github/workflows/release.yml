name: Release Android AAB

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
          exit 1
        fi
        printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > HKA_Handball/hkahandball.keystore
        if [ ! -s HKA_Handball/hkahandball.keystore ]; then
          echo "::error::Decoded keystore file is empty"
          exit 1
        fi
        chmod 600 HKA_Handball/hkahandball.keystore

    - name: Restore
      run: dotnet restore HKA_Handball/HKA_Handball.csproj

    - name: Publish Release AAB
      env:
        SIGNING_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        SIGNING_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        dotnet publish HKA_Handball/HKA_Handball.csproj \
          -f net10.0-android \
          -c Release \
          -p:AndroidSigningStorePass="$SIGNING_STORE_PASS" \
          -p:AndroidSigningKeyPass="$SIGNING_KEY_PASS"

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: android-release-aab
        path: HKA_Handball/bin/Release/net10.0-android/publish/*.aab

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: HKA_Handball/bin/Release/net10.0-android/publish/*.aab
        generate_release_notes: true
