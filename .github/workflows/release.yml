name: Release Android AAB

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Install MAUI workload
      run: dotnet workload install maui-android

    - name: Decode keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set"
          exit 1
        fi
        printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > HKA_Handball/hkahandball.keystore
        chmod 600 HKA_Handball/hkahandball.keystore
        FILE_SIZE=$(stat -c%s HKA_Handball/hkahandball.keystore)
        if [ "$FILE_SIZE" -lt 100 ]; then
          echo "::error::Decoded keystore is suspiciously small ($FILE_SIZE bytes)"
          exit 1
        fi
        echo "Keystore decoded successfully ($FILE_SIZE bytes)"

    - name: Validate keystore
      env:
        SIGNING_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      run: |
        if [ -z "$SIGNING_STORE_PASS" ]; then
          echo "::error::ANDROID_KEYSTORE_PASSWORD secret is not set"
          exit 1
        fi
        keytool -list \
          -keystore HKA_Handball/hkahandball.keystore \
          -storepass "$SIGNING_STORE_PASS" \
          -alias hkahandball 2>&1 || {
          echo "::error::Keystore validation failed. Check ANDROID_KEYSTORE_PASSWORD and that the alias 'hkahandball' exists."
          exit 1
        }

    - name: Restore
      run: dotnet restore HKA_Handball/HKA_Handball.csproj

    - name: Publish Release AAB
      env:
        SIGNING_STORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        SIGNING_KEY_PASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        if [ -z "$SIGNING_KEY_PASS" ]; then
          echo "::error::ANDROID_KEY_PASSWORD secret is not set"
          exit 1
        fi
        dotnet publish HKA_Handball/HKA_Handball.csproj \
          -f net10.0-android \
          -c Release \
          -p:AndroidSigningStorePass="$SIGNING_STORE_PASS" \
          -p:AndroidSigningKeyPass="$SIGNING_KEY_PASS" \
          -p:JavaSdkDirectory="$JAVA_HOME"

    - name: Package native debug symbols
      id: package_symbols
      run: |
        SYMBOLS_DIR="HKA_Handball/obj/Release/net10.0-android/app_shared_libraries"
        if [ -d "$SYMBOLS_DIR" ]; then
          cd "$SYMBOLS_DIR"
          echo "Files in symbols directory:"
          find . -type f | sort
          # Only include .so files; Google Play rejects non-ELF entries like .manifest
          zip -r "$GITHUB_WORKSPACE/native-debug-symbols.zip" . -i "*.so"
          echo ""
          echo "ZIP contents:"
          unzip -l "$GITHUB_WORKSPACE/native-debug-symbols.zip"
          echo ""
          echo "Native debug symbols packaged ($(du -h "$GITHUB_WORKSPACE/native-debug-symbols.zip" | cut -f1))"
          # Verify that at least one .so file contains debug info
          for abi in arm64-v8a x86_64; do
            SO="$abi/libxamarin-app.so"
            if [ -f "$SO" ]; then
              if readelf -S "$SO" 2>/dev/null | grep -q '\.debug_'; then
                echo "✅ $SO contains native debug symbols"
              else
                echo "::warning::$SO does not contain .debug_ sections"
              fi
            fi
          done
          echo "symbols_created=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Native debug symbols directory not found at $SYMBOLS_DIR"
          echo "symbols_created=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload AAB artifact
      uses: actions/upload-artifact@v7
      with:
        name: android-release-aab
        path: HKA_Handball/bin/Release/net10.0-android/publish/*.aab

    - name: Upload native debug symbols artifact
      if: steps.package_symbols.outputs.symbols_created == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: native-debug-symbols
        path: native-debug-symbols.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          HKA_Handball/bin/Release/net10.0-android/publish/*.aab
          ${{ steps.package_symbols.outputs.symbols_created == 'true' && 'native-debug-symbols.zip' || '' }}
        generate_release_notes: true

    - name: Upload to Google Play Console
      if: secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
      uses: r0adkll/upload-google-play@v1.1.3
      with:
        serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        packageName: com.kaptenjon.hkahandball
        releaseFiles: HKA_Handball/bin/Release/net10.0-android/publish/*.aab
        track: internal
        status: draft
        debugSymbols: ${{ steps.package_symbols.outputs.symbols_created == 'true' && 'native-debug-symbols.zip' || '' }}
        releaseName: ${{ github.ref_name }}
